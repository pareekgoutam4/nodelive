<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Section</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7fb;
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 40px;
            color: #222;
        }

        .prsection {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .prproduct {
            width: 100%;
        }

        .productcard {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.08);
            transition: 0.3s ease;
        }

        

        .productimg {
            width: 100%;
            height: 250px;
            background: #f1f1f1;
            overflow: hidden;
        }

        .productimg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.4s;
        }

        

        .productinfo {
            padding: 20px;
        }

        .productcat {
            color: #0a8f4d;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .productname {
            font-size: 22px;
            margin-bottom: 15px;
            color: #222;
        }

        .pricebox {
            margin-bottom: 18px;
        }

        .price {
            font-size: 24px;
            color: #111;
            font-weight: bold;
        }

        .productdetails {
            margin-bottom: 18px;
        }

        .productdetails summary {
            cursor: pointer;
            font-weight: bold;
            color: #444;
        }

        .productdetails p {
            margin-top: 10px;
            line-height: 1.6;
            color: #666;
            font-size: 15px;
        }

        .buybtn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #111;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

       
    </style>

</head>

<body>

    <h1>Products</h1>

    <div class="prsection"></div>

    <script>

        async function Getproducts() {

            const apiurl = await fetch("http://localhost:5000/products");
            const products = await apiurl.json();

            const section = document.querySelector(".prsection");

            products.forEach(product => {

                const div = document.createElement("div")
                div.className = "prproduct"

                div.innerHTML = `

                <div class="productcard">

                    <div class="productimg">
                        <img src="${product.image}" alt="">
                    </div>

                    <div class="productinfo">

                        <p class="productcat">${product.category}</p>
                        <h4 class="productname">${product.title}</h4>
                          <div class="pricebox">
                            <span class="price">₹ ${product.price}</span>
                        </div>
                    <details class="productdetails">
                            <summary>View Description</summary>
                            <p>${product.description}</p>
                        </details>

                        <button class="buybtn">Add to cart</button>

                    </div>

                </div>

                `;

                section.appendChild(div);

            });

        }

        Getproducts();

    </script>

</body>

</html>
